<!DOCTYPE html>
<html lang="en">
<head>
    <title>Users Records</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Angular -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

    <script>
        var module = angular.module("usersModule", []);
        module.controller("usersController", function ($scope, $http) {

            $scope.jsonAry = [];

            $scope.doFetchUsers = function () {
                $http.get("angular-fetchUsers").then(allGood, errKuch);

                function allGood(result) {
                    $scope.jsonAry = result.data;
                }

                function errKuch(err) {
                    alert(err);
                }
            }

            $scope.doBlock = function (email) {
                $http.get("/angular-userBlock?txtEmail=" + email).then(allGood, errBad);

                function allGood(result) {
                    alert(result.data);
                    $scope.doFetchUsers(); // 🔄 refresh
                }

                function errBad(err) {
                    alert(err);
                }
            }

            $scope.doResume = function (email) {
                $http.get("/angular-userResume?txtEmail=" + email).then(allGood, errBad);

                function allGood(result) {
                    alert(result.data);
                    $scope.doFetchUsers(); // 🔄 refresh
                }

                function errBad(err) {
                    alert(err);
                }
            }

        });
    </script>
</head>

<body class="bg-light" ng-app="usersModule" ng-controller="usersController">

<div class="container mt-5">

    <!-- Heading -->
    <h2 class="text-center mb-4">All Users Records</h2>

    <!-- Button -->
    <div class="text-center mb-3">
        <button class="btn btn-primary" ng-click="doFetchUsers()">
            Fetch All Users
        </button>
    </div>

    <!-- Card -->
    <div class="card shadow">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-hover table-striped text-center">

                    <thead class="table-dark">
                        <tr>
                            <th>Sr.No</th>
                            <th>Email</th>
                            <th>User Type</th>
                            <!-- <th>Date</th> -->
                            <th>Status</th>
                            <th>Operations</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr ng-repeat="obj in jsonAry">
                            <td>{{$index+1}}</td>
                            <td>{{obj.emailid}}</td>
                            <td>{{obj.utype}}</td>
                            <td>
                                <span class="badge bg-success" ng-if="obj.txtStatus==1">Active</span>
                                <span class="badge bg-danger" ng-if="obj.txtStatus==0">Blocked</span>
                            </td>

                            <td>
                                <button class="btn btn-danger btn-sm"
                                        ng-click="doBlock(obj.emailid)">
                                    Block
                                </button>

                                <button class="btn btn-success btn-sm"
                                        ng-click="doResume(obj.emailid)">
                                    Resume
                                </button>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
