<!DOCTYPE html>
<html lang="en">
<head>
    <title>Volunteers Records</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Angular -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

    <script>
        var module = angular.module("volantierModule", []);
        module.controller("volantierController", function ($scope, $http) {
            $scope.jsonAry = [];

            $scope.doFetchVolantier = function () {
                $http.get("angular-fetchVolantiers").then(allGood, errKuch);

                function allGood(result) {
                    $scope.jsonAry = result.data;
                }

                function errKuch(err) {
                    alert(err);
                }
            }
        });
    </script>
</head>

<body class="bg-light" ng-app="volantierModule" ng-controller="volantierController">

<div class="container mt-5">

    <!-- Heading -->
    <h2 class="text-center mb-4">All Volunteers Records</h2>

    <!-- Button -->
    <div class="text-center mb-3">
        <button class="btn btn-primary" ng-click="doFetchVolantier()">
            Fetch All Users
        </button>
    </div>

    <!-- Table Card -->
    <div class="card shadow">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-hover table-striped text-center">
                    
                    <thead class="table-dark">
                        <tr>
                            <th>Sr.No</th>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Number</th>
                            <th>Address</th>
                            <th>City</th>
                            <th>Gender</th>
                            <th>Occupation</th>
                            <th>Volunteer Type</th>
                            <th>Adhar card url</th>
                            <th>Profile Pic url</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr ng-repeat="obj in jsonAry">
                            <td>{{$index+1}}</td>
                            <td>{{obj.emailid}}</td>
                            <td>{{obj.name}}</td>
                            <td>{{obj.contact}}</td>
                            <td>{{obj.address}}</td>
                            <td>{{obj.city}}</td>
                            <td>{{obj.gender}}</td>
                            <td>{{obj.Occupation}}</td>
                            <td>{{obj.vtype}}</td>
                            <td>{{obj.acardnourl}}</td>
                            <td>{{obj.picurl}}</td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
